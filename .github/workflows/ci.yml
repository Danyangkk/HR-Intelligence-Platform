name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  router-gate:
    name: Router regression (offline)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: hr
          POSTGRES_PASSWORD: hr
          POSTGRES_DB: hr_agent
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hr -d hr_agent"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://hr:hr@localhost:5432/hr_agent
      SECRET_KEY: ci-test-secret
      ENV: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt "pytest>=7"

      - name: Router regression gate
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/backend
        run: pytest backend/tests/test_router.py -m offline -q

  test:
    name: Backend tests (no online LLM)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: hr
          POSTGRES_PASSWORD: hr
          POSTGRES_DB: hr_agent
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hr -d hr_agent"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://hr:hr@localhost:5432/hr_agent
      SECRET_KEY: ci-test-secret
      ENV: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt "pytest>=7"

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/backend
        run: pytest backend/tests -m "not online" -q

  fresh-clone-smoke:
    name: Fresh clone smoke (docker compose)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fresh clone smoke
        run: sh backend/scripts/fresh_clone_smoke.sh

      - name: Compose logs on failure
        if: failure()
        run: docker compose logs --no-color
