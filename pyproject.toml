[tool.ruff]
target-version = "py311"
line-length = 100
src = ["backend/src"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"backend/alembic/**" = ["E402", "F401"]

[tool.pytest.ini_options]
testpaths = ["backend/tests"]
pythonpath = [".", "backend"]
markers = [
    "offline: router regression gate (CI, no live LLM)",
    "online: router smoke with live LLM (manual only)",
]
addopts = "-m 'not online'"

[tool.mypy]
python_version = "3.11"
files = ["backend/src"]
ignore_missing_imports = true
strict = false
